name: testing Workflow
on:
  push:
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: clone repo
        uses: actions/checkout@v4
      - name: setup node version
        uses : actions/setup-node@v4
        with:
          node-version: 20.x
      - name: install dependencies
        run: npm ci
      - name: run tests
        run: npm test